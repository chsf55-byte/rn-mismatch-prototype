<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRN Mismatch Resolution — Supy Procurement</title>
<style>
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #141815;
      --surface: #1B211D;
      --surface-2: #212822;
      --border: #323930;
      --border-strong: #454E44;
      --ink: #EDEFEA;
      --ink-soft: #A9B3AC;
      --ink-faint: #78827C;
      --accent: #E0824F;
      --accent-ink: #1B211D;
      --accent-soft: rgba(224,130,79,0.16);
      --success: #52B279;
      --success-soft: rgba(82,178,121,0.15);
      --warning: #D9AC44;
      --warning-soft: rgba(217,172,68,0.15);
      --critical: #E17677;
      --critical-soft: rgba(225,118,119,0.15);
      --escalate: #9498DC;
      --escalate-soft: rgba(148,152,220,0.16);
      --shadow: 0 8px 30px rgba(0,0,0,0.45);
    }
  }
  :root {
    --ground: #EEF0EA;
    --surface: #FFFFFF;
    --surface-2: #F5F6F1;
    --border: #DBDECF;
    --border-strong: #C3C7B4;
    --ink: #1B231F;
    --ink-soft: #5B655E;
    --ink-faint: #8A927F;
    --accent: #B8562F;
    --accent-ink: #FFFFFF;
    --accent-soft: #F3E1D3;
    --success: #2F7A4F;
    --success-soft: #DEEFE3;
    --warning: #A17209;
    --warning-soft: #F3E7C8;
    --critical: #AC3B3B;
    --critical-soft: #F4DEDD;
    --escalate: #55599F;
    --escalate-soft: #E4E4F3;
    --shadow: 0 8px 30px rgba(30,35,25,0.10);
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "Cascadia Mono", "Segoe UI Mono", Consolas, "Liberation Mono", monospace;
  }
  :root[data-theme="dark"] {
    --ground: #141815; --surface: #1B211D; --surface-2: #212822; --border: #323930; --border-strong: #454E44;
    --ink: #EDEFEA; --ink-soft: #A9B3AC; --ink-faint: #78827C;
    --accent: #E0824F; --accent-ink: #1B211D; --accent-soft: rgba(224,130,79,0.16);
    --success: #52B279; --success-soft: rgba(82,178,121,0.15);
    --warning: #D9AC44; --warning-soft: rgba(217,172,68,0.15);
    --critical: #E17677; --critical-soft: rgba(225,118,119,0.15);
    --escalate: #9498DC; --escalate-soft: rgba(148,152,220,0.16);
    --shadow: 0 8px 30px rgba(0,0,0,0.45);
  }
  :root[data-theme="light"] {
    --ground: #EEF0EA; --surface: #FFFFFF; --surface-2: #F5F6F1; --border: #DBDECF; --border-strong: #C3C7B4;
    --ink: #1B231F; --ink-soft: #5B655E; --ink-faint: #8A927F;
    --accent: #B8562F; --accent-ink: #FFFFFF; --accent-soft: #F3E1D3;
    --success: #2F7A4F; --success-soft: #DEEFE3;
    --warning: #A17209; --warning-soft: #F3E7C8;
    --critical: #AC3B3B; --critical-soft: #F4DEDD;
    --escalate: #55599F; --escalate-soft: #E4E4F3;
    --shadow: 0 8px 30px rgba(30,35,25,0.10);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-ui);
    background: var(--ground);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button, input, select { font-family: inherit; font-size: inherit; color: inherit; }
  table { border-collapse: collapse; }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  ::selection { background: var(--accent-soft); }
  a { color: inherit; }

  .app { display: flex; min-height: 100vh; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 216px; flex: none;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 20px 12px;
    gap: 4px;
  }
  .brand {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 8px 20px 8px;
    font-weight: 700; font-size: 16px; letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--accent); color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
  }
  .navgroup-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--ink-faint); padding: 12px 10px 6px;
  }
  .navitem {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    color: var(--ink-soft); text-decoration: none;
    font-size: 13.5px; font-weight: 500;
    cursor: pointer; border: none; background: none; width: 100%; text-align: left;
  }
  .navitem svg { flex: none; opacity: 0.8; }
  .navitem:hover { background: var(--surface-2); color: var(--ink); }
  .navitem.active { background: var(--accent-soft); color: var(--accent); }
  .navitem.active svg { opacity: 1; }
  .navitem.disabled { opacity: 0.45; cursor: default; }
  .navitem.disabled:hover { background: none; color: var(--ink-soft); }
  .navbadge {
    margin-left: auto; background: var(--critical); color: white;
    font-size: 10.5px; font-weight: 700; padding: 1px 6px; border-radius: 999px;
  }

  /* ---------- Main / Topbar ---------- */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 5;
  }
  .role-switch {
    display: flex; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px; gap: 2px;
  }
  .role-switch button {
    border: none; background: none; padding: 6px 14px; border-radius: 999px;
    font-size: 12.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer;
  }
  .role-switch button.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ink-soft); position: relative;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--ink); }
  .whoami { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ink-soft); }
  .avatar {
    width: 26px; height: 26px; border-radius: 50%; background: var(--escalate-soft); color: var(--escalate);
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
  }

  .view { padding: 24px 28px 60px; max-width: 1180px; width: 100%; margin: 0 auto; }

  .page-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
  .page-head h1 { font-size: 20px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .page-sub { color: var(--ink-soft); font-size: 13px; margin: 0; }

  /* ---------- Stat tiles ---------- */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 11.5px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .stat-value.accentc { color: var(--critical); }
  .stat-value.accente { color: var(--escalate); }
  .stat-value.accents { color: var(--success); }

  /* ---------- Filter bar ---------- */
  .filterbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .chip-filter {
    border: 1px solid var(--border); background: var(--surface); color: var(--ink-soft);
    padding: 6px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 600; cursor: pointer;
  }
  .chip-filter.active { background: var(--ink); color: var(--surface); border-color: var(--ink); }
  :root[data-theme="dark"] .chip-filter.active, body:not([data-force]) .chip-filter.active {}
  .searchbox {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    border: 1px solid var(--border); background: var(--surface); border-radius: 8px; padding: 6px 10px;
    min-width: 220px;
  }
  .searchbox input { border: none; outline: none; background: none; width: 100%; font-size: 13px; }
  .searchbox svg { flex: none; color: var(--ink-faint); }

  /* ---------- Table ---------- */
  .tablewrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .scrollx { overflow-x: auto; }
  table.grid { width: 100%; min-width: 860px; }
  table.grid th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--ink-faint); font-weight: 600; padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  table.grid td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13.5px; vertical-align: middle; }
  table.grid tbody tr:last-child td { border-bottom: none; }
  table.grid tbody tr.rowlink { cursor: pointer; }
  table.grid tbody tr.rowlink:hover { background: var(--surface-2); }
  .cell-primary { font-weight: 600; }
  .cell-sub { color: var(--ink-faint); font-size: 12px; margin-top: 1px; }
  .td-amount { text-align: right; }
  .amount-neg { color: var(--critical); }
  .amount-pos { color: var(--success); }

  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 700;
    white-space: nowrap;
  }
  .chip::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .chip-open { background: var(--warning-soft); color: var(--warning); }
  .chip-escalated { background: var(--escalate-soft); color: var(--escalate); }
  .chip-resolved { background: var(--success-soft); color: var(--success); }
  .chip-none { background: var(--surface-2); color: var(--ink-faint); }
  .age-tag { font-size: 12px; color: var(--ink-soft); }
  .age-tag.aged { color: var(--critical); font-weight: 700; }

  .sev { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700; white-space: nowrap; }
  .sev::before { content: ""; width: 7px; height: 7px; border-radius: 2px; background: currentColor; flex: none; }
  .sev-critical { color: var(--critical); }
  .sev-medium { color: var(--warning); }
  .sev-small { color: var(--ink-faint); }

  .empty { padding: 48px 20px; text-align: center; color: var(--ink-faint); }

  /* ---------- Buttons ---------- */
  .btn {
    border: 1px solid var(--border); background: var(--surface); color: var(--ink);
    padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--surface-2); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .btn-primary:hover { filter: brightness(1.06); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }
  .btn-ghost { background: none; border-color: transparent; color: var(--ink-soft); padding: 8px 10px; }
  .btn-ghost:hover { background: var(--surface-2); color: var(--ink); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ---------- Detail page ---------- */
  .backlink {
    display: inline-flex; align-items: center; gap: 6px; color: var(--ink-soft);
    font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 14px; border: none; background: none; padding: 0;
  }
  .backlink:hover { color: var(--ink); }

  .grn-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; }
  .grn-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; flex-wrap: wrap; }
  .grn-title { font-size: 17px; font-weight: 700; margin: 0 0 4px; }
  .meta-row { display: flex; gap: 22px; flex-wrap: wrap; margin-top: 12px; }
  .meta-item { font-size: 12.5px; }
  .meta-item .k { color: var(--ink-faint); display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; font-size: 10.5px; }
  .meta-item .v { font-weight: 600; }

  .banner {
    display: flex; align-items: flex-start; gap: 12px;
    border-radius: 10px; padding: 13px 16px; margin-bottom: 16px; font-size: 13.5px;
  }
  .banner.b-open { background: var(--warning-soft); color: var(--warning); }
  .banner.b-escalated { background: var(--escalate-soft); color: var(--escalate); }
  .banner.b-resolved { background: var(--success-soft); color: var(--success); }
  .banner strong { display: block; margin-bottom: 2px; color: var(--ink); font-size: 13.5px; }
  .banner .btext { color: var(--ink-soft); }

  .section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faint); margin: 22px 0 10px; }

  .linecard {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; margin-bottom: 10px;
  }
  .linecard.is-flagged { border-color: var(--border-strong); }
  .line-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
  .line-name { font-weight: 700; font-size: 14.5px; }
  .line-compare { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 12px; }
  .cmp-block { background: var(--surface-2); border-radius: 8px; padding: 10px 12px; }
  .cmp-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faint); margin-bottom: 6px; }
  .cmp-value { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 14px; }
  .cmp-value .unit { color: var(--ink-faint); font-size: 12px; }
  .cmp-block.variance .cmp-value { font-weight: 700; }
  .cmp-block.variance.neg .cmp-value { color: var(--critical); }
  .cmp-block.variance.pos .cmp-value { color: var(--success); }
  .op-note { margin-top: 10px; font-size: 12.5px; color: var(--ink-soft); background: var(--surface-2); border-radius: 8px; padding: 8px 12px; }
  .op-note .k { font-weight: 700; color: var(--ink); }
  .line-actions { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  .resolution-summary {
    margin-top: 12px; border-top: 1px dashed var(--border); padding-top: 12px;
    font-size: 12.5px; display: flex; gap: 8px; align-items: flex-start;
  }
  .resolution-summary .rlabel { font-weight: 700; }
  .resolution-summary .rnote { color: var(--ink-soft); }

  /* ---------- Timeline ---------- */
  .timeline { list-style: none; margin: 0; padding: 0; }
  .timeline li { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .timeline li:last-child { border-bottom: none; }
  .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex: none; }
  .tl-body { flex: 1; }
  .tl-head { font-size: 13px; font-weight: 600; }
  .tl-meta { font-size: 11.5px; color: var(--ink-faint); margin-top: 1px; }
  .tl-note { font-size: 12.5px; color: var(--ink-soft); margin-top: 4px; background: var(--surface-2); border-radius: 8px; padding: 8px 10px; }

  /* ---------- Drawer ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(20,24,20,0.35); z-index: 40;
    opacity: 0; pointer-events: none; transition: opacity 0.15s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: 420px; max-width: 92vw;
    background: var(--surface); border-left: 1px solid var(--border); box-shadow: var(--shadow);
    z-index: 41; transform: translateX(100%); transition: transform 0.18s ease;
    display: flex; flex-direction: column;
  }
  .drawer.show { transform: translateX(0); }
  .drawer-head { padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .drawer-head h3 { margin: 0 0 3px; font-size: 15.5px; }
  .drawer-head p { margin: 0; font-size: 12.5px; color: var(--ink-soft); }
  .drawer-body { padding: 18px 20px; overflow-y: auto; flex: 1; }
  .drawer-foot { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

  .action-tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .action-tab {
    flex: 1 1 calc(50% - 6px); border: 1px solid var(--border); background: var(--surface-2);
    padding: 8px 6px; border-radius: 8px; font-size: 11.5px; font-weight: 700; cursor: pointer; color: var(--ink-soft);
    text-align: center;
  }
  .action-tab.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--ink); }
  .field .hint { font-size: 11.5px; color: var(--ink-faint); margin-top: 4px; }
  .field input[type="text"], .field input[type="number"], .field select, .field textarea {
    width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    background: var(--surface); color: var(--ink); outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field textarea { resize: vertical; min-height: 64px; font-family: inherit; }
  .field-recap { background: var(--surface-2); border-radius: 8px; padding: 10px 12px; font-size: 12.5px; margin-bottom: 14px; }
  .field-recap .row { display: flex; justify-content: space-between; padding: 2px 0; }
  .field-recap .row .k { color: var(--ink-faint); }
  .field-recap .row .v { font-family: var(--font-mono); font-weight: 600; }

  /* ---------- Settings popover ---------- */
  .popover {
    position: absolute; top: 44px; right: 28px; width: 260px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow);
    padding: 16px; z-index: 30; display: none;
  }
  .popover.show { display: block; }
  .popover h4 { margin: 0 0 4px; font-size: 13px; }
  .popover .sub { font-size: 11.5px; color: var(--ink-faint); margin: 0 0 12px; }
  .tolerow { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .tolerow label { font-size: 12.5px; }
  .tolerow .inputwrap { display: flex; align-items: center; gap: 4px; }
  .tolerow input { width: 54px; border: 1px solid var(--border); border-radius: 6px; padding: 5px 6px; text-align: right; background: var(--surface); color: var(--ink); }

  /* ---------- Notifications popover ---------- */
  .notif-pop { width: 300px; padding: 8px 0 4px; }
  .notif-pop h4 { padding: 0 16px; }
  .notif-pop .sub { padding: 0 16px; }
  .notif-list { max-height: 320px; overflow-y: auto; margin-top: 4px; }
  .notif-item {
    display: block; width: 100%; text-align: left; border: none; background: none; cursor: pointer;
    padding: 9px 16px; border-top: 1px solid var(--border);
  }
  .notif-item:hover { background: var(--surface-2); }
  .notif-top { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
  .notif-title { font-size: 12.5px; font-weight: 700; }
  .notif-sub { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; }
  .notif-empty { padding: 16px; font-size: 12.5px; color: var(--ink-faint); text-align: center; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--ground); padding: 11px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 600; box-shadow: var(--shadow); z-index: 60;
    opacity: 0; pointer-events: none; transition: all 0.2s ease;
  }
  :root[data-theme="dark"] .toast { background: var(--surface-2); color: var(--ink); border: 1px solid var(--border-strong); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 880px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .line-compare { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="brand-mark">S</span> Supy</div>
    <div class="navgroup-label">Procurement</div>
    <button class="navitem disabled" title="Not part of this prototype">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/></svg>
      Purchase orders
    </button>
    <button class="navitem disabled" title="Not part of this prototype">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 4h8v6H1z" stroke="currentColor" stroke-width="1.4"/><path d="M9 7h3l2 2v1h-5z" stroke="currentColor" stroke-width="1.4"/><circle cx="4" cy="12.5" r="1.3" stroke="currentColor" stroke-width="1.2"/><circle cx="11.5" cy="12.5" r="1.3" stroke="currentColor" stroke-width="1.2"/></svg>
      Goods receiving
    </button>
    <button class="navitem" data-nav="mismatches">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5 15 14H1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M8 6.2v3.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="8" cy="11.5" r="0.9" fill="currentColor"/></svg>
      Mismatches
      <span class="navbadge" id="navBadge">0</span>
    </button>
    <div class="navgroup-label">Directory</div>
    <button class="navitem disabled" title="Not part of this prototype">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="1.5" width="10" height="13" rx="1" stroke="currentColor" stroke-width="1.4"/><path d="M6 5h4M6 8h4M6 11h2" stroke="currentColor" stroke-width="1.2"/></svg>
      Suppliers
    </button>
    <button class="navitem disabled" title="Not part of this prototype">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.4"/><path d="M8 5v3l2 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Settings
    </button>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="role-switch" id="roleSwitch">
        <button data-role="reviewer" class="active">Reviewer view</button>
        <button data-role="operator">Operator view</button>
      </div>
      <div class="topbar-right">
        <div class="whoami" id="whoami"></div>
        <button class="icon-btn" id="bellBtn" title="Notifications">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.6c-2 0-3.4 1.6-3.4 3.8v2.1c0 .5-.2 1.2-.6 1.7l-.6.8c-.4.5-.1 1.3.6 1.3h8c.7 0 1-.8.6-1.3l-.6-.8c-.4-.5-.6-1.2-.6-1.7V5.4c0-2.2-1.4-3.8-3.4-3.8Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M6.4 13c.3.6.9 1 1.6 1s1.3-.4 1.6-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
          <span class="navbadge" id="bellBadge" style="position:absolute; top:-4px; right:-4px;">0</span>
        </button>
        <div class="popover notif-pop" id="notifPop">
          <h4 id="notifTitle">Needs your review</h4>
          <p class="sub" id="notifSub">GRNs with lines waiting on a decision.</p>
          <div class="notif-list" id="notifList"></div>
        </div>
        <button class="icon-btn" id="settingsBtn" title="Tolerance settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.4" stroke="currentColor" stroke-width="1.3"/><path d="M8 1.6v1.6M8 12.8v1.6M14.4 8h-1.6M3.2 8H1.6M12.5 3.5l-1.1 1.1M4.6 11.4l-1.1 1.1M12.5 12.5l-1.1-1.1M4.6 4.6l-1.1-1.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
        <div class="popover" id="tolPop">
          <h4>Mismatch tolerance</h4>
          <p class="sub">Applies to lines not yet reviewed. Resolved or escalated lines keep their history.</p>
          <div class="tolerow">
            <label>Quantity variance</label>
            <div class="inputwrap"><input type="number" id="tolQty" step="0.5" min="0"> <span>%</span></div>
          </div>
          <div class="tolerow">
            <label>Price variance</label>
            <div class="inputwrap"><input type="number" id="tolPrice" step="0.5" min="0"> <span>%</span></div>
          </div>
          <button class="btn btn-primary btn-sm" id="tolApply" style="width:100%; justify-content:center;">Apply</button>
        </div>
      </div>
    </div>

    <div class="view" id="viewRoot"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer"></aside>
<div class="toast" id="toast"></div>

<script>
(function(){

  var today = new Date('2026-07-13');

  var state = {
    role: 'reviewer',
    queueFilter: 'all',
    queueSearch: '',
    screen: { name: 'queue' },
    tolerance: { qty: 2, price: 1 },
    operatorUser: 'Downtown Branch Operator'
  };

  var reviewers = ['Finance Director', 'Accounts Manager'];

  function mkLine(id, item, cq, cp, rq, rp, opNote, resolution){
    return { id: id, item: item, confirmedQty: cq, confirmedPrice: cp, receivedQty: rq, receivedPrice: rp,
      opNote: opNote || '', resolution: resolution || null };
  }

  var grns = [
    {
      id: 'GRN-1045', po: 'PO-2311', supplier: 'Northern Dairy Co.', branch: 'Downtown Branch',
      date: '2026-07-12', receivedBy: 'Downtown Branch Operator',
      lines: [
        mkLine('l1', 'Milk cartons, 1L', 200, 1.05, 200, 1.05, ''),
        mkLine('l2', 'Cheese blocks, 1kg', 30, 5.00, 27, 5.00, 'Box was torn in transit, driver signed off on the shortage on the spot.')
      ]
    },
    {
      id: 'GRN-1042', po: 'PO-2298', supplier: 'Freshway Produce', branch: 'Downtown Branch',
      date: '2026-07-10', receivedBy: 'Downtown Branch Operator',
      lines: [
        mkLine('l1', 'Tomatoes, vine', 50, 2.00, 42, 2.00, 'Driver said the rest is coming with tomorrow\'s run.'),
        mkLine('l2', 'Onions, yellow', 30, 1.20, 30, 1.35, 'Invoice price looked different from the PO, flagging just in case.'),
        mkLine('l3', 'Lettuce, iceberg', 20, 1.50, 20, 1.50, '')
      ]
    },
    {
      id: 'GRN-1039', po: 'PO-2287', supplier: 'Coastal Meats', branch: 'Central Kitchen',
      date: '2026-07-08', receivedBy: 'Central Kitchen Operator',
      lines: [
        mkLine('l1', 'Chicken breast', 100, 6.00, 100, 6.00, ''),
        mkLine('l2', 'Beef mince', 60, 8.50, 54, 8.50, 'Driver confirmed a short-load, said remainder isn\'t guaranteed for next batch.',
          { type: 'credit_note', actor: 'Procurement Lead', ts: '2026-07-09 11:20', note: 'Real shortfall, not a rounding issue. Taking a credit rather than chasing redelivery for 6kg.', amount: 51.00, ref: 'CN-4471' }),
        mkLine('l4', 'Fresh herbs bundle', 5, 3.00, 4.8, 3.00, 'Slight trim loss, herbs are always a bit inconsistent by weight.',
          { type: 'accept', actor: 'Procurement Lead', ts: '2026-07-09 11:26', note: 'Within normal spoilage/trim variance for fresh herbs — not worth chasing for $0.60.' })
      ]
    },
    {
      id: 'GRN-1035', po: 'PO-2266', supplier: 'Golden Bakery Co.', branch: 'Downtown Branch',
      date: '2026-07-05', receivedBy: 'Downtown Branch Operator',
      lines: [
        mkLine('l1', 'Flour, 25kg bag', 20, 18.00, 20, 19.50, 'Supplier rep mentioned a fuel surcharge when dropping off.',
          { type: 'escalate', actor: 'Procurement Lead', ts: '2026-07-06 09:40', note: 'Need to check whether our contract has a surcharge clause before agreeing to this. Passing to Finance.', to: 'Finance Director' })
      ]
    },
    {
      id: 'GRN-1028', po: 'PO-2240', supplier: 'Coastal Meats', branch: 'Central Kitchen',
      date: '2026-07-01', receivedBy: 'Central Kitchen Operator',
      lines: [
        mkLine('l1', 'Salmon fillet', 40, 14.00, 45, 14.00, 'Extra box included, didn\'t order this much.')
      ]
    },
    {
      id: 'GRN-1020', po: 'PO-2199', supplier: 'Freshway Produce', branch: 'Uptown Branch',
      date: '2026-06-25', receivedBy: 'Uptown Branch Operator',
      lines: [
        mkLine('l1', 'Potatoes, russet', 100, 0.90, 99, 0.90, ''),
        mkLine('l2', 'Carrots', 40, 1.10, 40, 1.25, 'Supplier said prices went up this week, wasn\'t sure if it was agreed.',
          { type: 'price_adjust', actor: 'Procurement Lead', ts: '2026-06-26 14:05', note: 'Called supplier — agreed to split the difference rather than pay the full increase.', newPrice: 1.15 })
      ]
    },
    {
      id: 'GRN-1018', po: 'PO-2180', supplier: 'Northern Dairy Co.', branch: 'Downtown Branch',
      date: '2026-06-20', receivedBy: 'Downtown Branch Operator',
      lines: [
        mkLine('l1', 'Yogurt cups, 150g', 100, 0.80, 100, 0.95, 'Cashier-facing invoice showed a higher rate than what we normally pay.',
          { type: 'price_adjust', actor: 'Procurement Lead', ts: '2026-06-21 10:12', note: 'Supplier confirmed their system had a stale price — agreed rate on file.', newPrice: 0.85 })
      ]
    }
  ];

  // ---------- Derived calculations ----------
  function qtyVariancePct(l){ return l.confirmedQty ? (l.receivedQty - l.confirmedQty) / l.confirmedQty * 100 : 0; }
  function priceVariancePct(l){ return l.confirmedPrice ? (l.receivedPrice - l.confirmedPrice) / l.confirmedPrice * 100 : 0; }
  function dollarImpact(l){ return (l.receivedQty * l.receivedPrice) - (l.confirmedQty * l.confirmedPrice); }

  function isWithinTolerance(l){
    return Math.abs(qtyVariancePct(l)) <= state.tolerance.qty && Math.abs(priceVariancePct(l)) <= state.tolerance.price;
  }

  function lineStatus(l){
    if (l.resolution) return l.resolution.type === 'escalate' ? 'escalated' : 'resolved';
    return isWithinTolerance(l) ? 'none' : 'open';
  }

  function grnFlaggedLines(g){ return g.lines.filter(function(l){ return lineStatus(l) !== 'none'; }); }

  function grnStatus(g){
    var flagged = grnFlaggedLines(g);
    if (flagged.length === 0) return 'none';
    var statuses = flagged.map(lineStatus);
    if (statuses.indexOf('open') > -1) return 'open';
    if (statuses.indexOf('escalated') > -1) return 'escalated';
    return 'resolved';
  }

  function daysAgo(dateStr){
    var d = new Date(dateStr);
    return Math.round((today - d) / 86400000);
  }

  function fmtMoney(n){
    var sign = n < 0 ? '-' : '';
    return sign + '$' + Math.abs(n).toFixed(2);
  }
  function fmtQty(n){
    return (Math.round(n * 100) / 100).toString();
  }

  // ---------- Severity ----------
  // Placeholder thresholds — tuned per customer once real $ distributions are known, same as tolerance.
  function severityTier(absDollar){
    if (absDollar >= 50) return 'critical';
    if (absDollar >= 15) return 'medium';
    return 'small';
  }
  var SEV_RANK = { critical: 3, medium: 2, small: 1 };
  function lineSeverity(l){ return severityTier(Math.abs(dollarImpact(l))); }
  function grnExposure(g){
    return grnFlaggedLines(g).reduce(function(sum, l){ return sum + Math.abs(dollarImpact(l)); }, 0);
  }
  function grnSeverity(g){ return severityTier(grnExposure(g)); }
  function sevLabel(tier){ return { critical: 'Critical', medium: 'Medium', small: 'Small' }[tier]; }
  function sevTag(tier){ return '<span class="sev sev-' + tier + '">' + sevLabel(tier) + '</span>'; }

  // ---------- Recovered value (the $ this feature actually saved) ----------
  function recoveredValue(l){
    if (!l.resolution) return 0;
    if (l.resolution.type === 'credit_note') return l.resolution.amount;
    if (l.resolution.type === 'price_adjust') return (l.receivedPrice - l.resolution.newPrice) * l.receivedQty;
    return 0;
  }

  // ---------- Global stats ----------
  function computeStats(){
    var openLines = 0, atRisk = 0, escalated = 0, resolvedThisWeek = 0, recovered30d = 0;
    grns.forEach(function(g){
      g.lines.forEach(function(l){
        var st = lineStatus(l);
        if (st === 'open') { openLines++; atRisk += Math.abs(dollarImpact(l)); }
        if (st === 'escalated') escalated++;
        if (st === 'resolved' && l.resolution) {
          var age = daysAgo(l.resolution.ts.split(' ')[0]);
          if (age <= 7) resolvedThisWeek++;
          if (age <= 30) recovered30d += recoveredValue(l);
        }
      });
    });
    return { openLines: openLines, atRisk: atRisk, escalated: escalated, resolvedThisWeek: resolvedThisWeek, recovered30d: recovered30d };
  }

  // ---------- Rendering ----------
  var root = document.getElementById('viewRoot');

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function chipHtml(status){
    var map = {
      open: ['chip-open', 'Needs review'],
      escalated: ['chip-escalated', 'Escalated'],
      resolved: ['chip-resolved', 'Resolved'],
      none: ['chip-none', 'No mismatch']
    };
    var m = map[status];
    return '<span class="chip ' + m[0] + '">' + m[1] + '</span>';
  }

  function renderNav(){
    var badge = document.getElementById('navBadge');
    badge.textContent = computeStats().openLines;
    document.querySelectorAll('.navitem[data-nav]').forEach(function(el){
      el.classList.toggle('active', state.screen.name === 'queue' || state.screen.name === 'detail');
    });
    var who = document.getElementById('whoami');
    if (state.role === 'reviewer') {
      who.innerHTML = '<div class="avatar">PL</div><span>Procurement Lead</span>';
    } else {
      who.innerHTML = '<div class="avatar">OP</div><span>' + state.operatorUser + '</span>';
    }
  }

  // ---------- Notifications bell ----------
  // Reviewer: everything currently waiting on a decision. Operator: what's happened lately to deliveries they raised.
  function renderBell(){
    var title = document.getElementById('notifTitle');
    var sub = document.getElementById('notifSub');
    var list = document.getElementById('notifList');
    var badge = document.getElementById('bellBadge');
    var items = [];

    if (state.role === 'reviewer') {
      title.textContent = 'Needs your review';
      sub.textContent = 'GRNs with lines waiting on a decision.';
      var openGrns = grns.filter(function(g){ return grnStatus(g) === 'open'; });
      openGrns.sort(function(a,b){
        var rankDiff = SEV_RANK[grnSeverity(b)] - SEV_RANK[grnSeverity(a)];
        if (rankDiff !== 0) return rankDiff;
        return daysAgo(b.date) - daysAgo(a.date);
      });
      items = openGrns.map(function(g){
        var openCount = grnFlaggedLines(g).filter(function(l){ return lineStatus(l) === 'open'; }).length;
        return {
          grnId: g.id, readOnly: false,
          title: g.id + ' · ' + g.supplier,
          sub: openCount + ' line' + (openCount > 1 ? 's' : '') + ' · ' + sevLabel(grnSeverity(g)) + ' · ' + daysAgo(g.date) + 'd ago'
        };
      });
      badge.textContent = openGrns.length;
      badge.style.display = openGrns.length ? 'flex' : 'none';
    } else {
      title.textContent = 'Recently decided';
      sub.textContent = 'What Procurement resolved on your deliveries.';
      var mineResolved = [];
      grns.filter(function(g){ return g.receivedBy === state.operatorUser; }).forEach(function(g){
        g.lines.forEach(function(l){
          if (l.resolution && l.resolution.type !== 'escalate' && daysAgo(l.resolution.ts.split(' ')[0]) <= 30) {
            mineResolved.push({ g: g, l: l });
          }
        });
      });
      mineResolved.sort(function(a,b){ return new Date(b.l.resolution.ts) - new Date(a.l.resolution.ts); });
      items = mineResolved.map(function(x){
        return {
          grnId: x.g.id, readOnly: true,
          title: x.g.id + ' · ' + x.l.item,
          sub: resolutionLabel(x.l.resolution.type) + ' · ' + x.l.resolution.ts.split(' ')[0]
        };
      });
      badge.textContent = items.length;
      badge.style.display = items.length ? 'flex' : 'none';
    }

    if (items.length === 0) {
      list.innerHTML = '<div class="notif-empty">Nothing to show right now.</div>';
    } else {
      list.innerHTML = items.map(function(it){
        return '<button class="notif-item" data-notif-grn="' + it.grnId + '" data-notif-ro="' + (it.readOnly ? '1' : '0') + '">' +
          '<div class="notif-top"><span class="notif-title">' + it.title + '</span></div>' +
          '<div class="notif-sub">' + it.sub + '</div></button>';
      }).join('');
    }
  }

  function renderQueue(){
    var stats = computeStats();
    var rows = grns.filter(function(g){ return grnFlaggedLines(g).length > 0; });

    if (state.queueFilter !== 'all') {
      rows = rows.filter(function(g){ return grnStatus(g) === state.queueFilter; });
    }
    if (state.queueSearch.trim()) {
      var q = state.queueSearch.trim().toLowerCase();
      rows = rows.filter(function(g){ return (g.supplier + ' ' + g.branch + ' ' + g.id).toLowerCase().indexOf(q) > -1; });
    }
    // Default sort: worst severity first, then oldest first within a tier — biggest, longest-waiting problems surface automatically.
    rows.sort(function(a,b){
      var rankDiff = SEV_RANK[grnSeverity(b)] - SEV_RANK[grnSeverity(a)];
      if (rankDiff !== 0) return rankDiff;
      return daysAgo(b.date) - daysAgo(a.date);
    });

    var html = '';
    html += '<div class="page-head"><div><h1>Mismatch queue</h1><p class="page-sub">GRNs with a received quantity or price outside tolerance, across all branches and suppliers. Sorted by severity, then age.</p></div></div>';

    html += '<div class="stats">';
    html += statTile('Open lines', stats.openLines, '');
    html += statTile('Value at risk', fmtMoney(stats.atRisk), 'accentc');
    html += statTile('Escalated', stats.escalated, 'accente');
    html += statTile('Resolved this week', stats.resolvedThisWeek, '');
    html += statTile('Value recovered (30d)', fmtMoney(stats.recovered30d), 'accents');
    html += '</div>';

    html += '<div class="filterbar">';
    ['all','open','escalated','resolved'].forEach(function(f){
      var label = f === 'all' ? 'All' : f === 'open' ? 'Needs review' : f.charAt(0).toUpperCase() + f.slice(1);
      html += '<button class="chip-filter ' + (state.queueFilter === f ? 'active' : '') + '" data-filter="' + f + '">' + label + '</button>';
    });
    html += '<div class="searchbox"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.4" stroke="currentColor" stroke-width="1.3"/><path d="m9.4 9.4 3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg><input id="queueSearchInput" placeholder="Search supplier, branch, GRN…" value="' + escapeHtml(state.queueSearch) + '"></div>';
    html += '</div>';

    html += '<div class="tablewrap"><div class="scrollx"><table class="grid"><thead><tr>' +
      '<th>GRN</th><th>Supplier / Branch</th><th>Delivery date</th><th>Lines flagged</th><th>Severity</th><th class="td-amount">$ variance</th><th>Age</th><th>Status</th>' +
      '</tr></thead><tbody>';

    if (rows.length === 0) {
      html += '<tr><td colspan="8"><div class="empty">No mismatches match this filter.</div></td></tr>';
    } else {
      rows.forEach(function(g){
        var flagged = grnFlaggedLines(g);
        var dollarTotal = flagged.reduce(function(sum,l){ return sum + dollarImpact(l); }, 0);
        var age = daysAgo(g.date);
        var st = grnStatus(g);
        html += '<tr class="rowlink" data-open-grn="' + g.id + '">' +
          '<td class="cell-primary num">' + g.id + '<div class="cell-sub">' + g.po + '</div></td>' +
          '<td>' + g.supplier + '<div class="cell-sub">' + g.branch + '</div></td>' +
          '<td class="num">' + g.date + '</td>' +
          '<td>' + flagged.length + ' of ' + g.lines.length + '</td>' +
          '<td>' + sevTag(grnSeverity(g)) + '</td>' +
          '<td class="td-amount num ' + (dollarTotal < 0 ? 'amount-neg' : dollarTotal > 0 ? 'amount-pos' : '') + '">' + (dollarTotal === 0 ? '—' : fmtMoney(dollarTotal)) + '</td>' +
          '<td><span class="age-tag ' + (age > 7 && st !== 'resolved' ? 'aged' : '') + '">' + (st === 'resolved' ? '—' : age + 'd') + '</span></td>' +
          '<td>' + chipHtml(st) + '</td>' +
          '</tr>';
      });
    }
    html += '</tbody></table></div></div>';
    root.innerHTML = html;
  }

  function statTile(label, value, cls){
    return '<div class="stat"><div class="stat-label">' + label + '</div><div class="stat-value ' + cls + '">' + value + '</div></div>';
  }

  function resolutionLabel(type){
    return { accept: 'Accepted as-is', price_adjust: 'Price adjusted', credit_note: 'Credit note recorded', escalate: 'Escalated' }[type] || type;
  }

  function lineCompareBlock(l){
    var qv = qtyVariancePct(l), pv = priceVariancePct(l), dv = dollarImpact(l);
    var hasQty = Math.abs(qv) > 0.001, hasPrice = Math.abs(pv) > 0.001;
    var varianceParts = [];
    if (hasQty) varianceParts.push((qv > 0 ? '+' : '') + qv.toFixed(1) + '% qty');
    if (hasPrice) varianceParts.push((pv > 0 ? '+' : '') + pv.toFixed(1) + '% price');
    var varClass = dv < 0 ? 'neg' : dv > 0 ? 'pos' : '';
    return '<div class="line-compare">' +
      '<div class="cmp-block"><div class="cmp-label">Confirmed</div><div class="cmp-value">' + fmtQty(l.confirmedQty) + ' <span class="unit">@ ' + fmtMoney(l.confirmedPrice) + '</span></div></div>' +
      '<div class="cmp-block"><div class="cmp-label">Received</div><div class="cmp-value">' + fmtQty(l.receivedQty) + ' <span class="unit">@ ' + fmtMoney(l.receivedPrice) + '</span></div></div>' +
      '<div class="cmp-block variance ' + varClass + '"><div class="cmp-label">Variance</div><div class="cmp-value">' + (varianceParts.length ? varianceParts.join(' · ') : 'None') + '<div class="unit">' + (dv === 0 ? '' : fmtMoney(dv)) + '</div></div></div>' +
      '</div>';
  }

  function renderDetail(grnId, readOnly){
    var g = grns.find(function(x){ return x.id === grnId; });
    var st = grnStatus(g);
    var flagged = grnFlaggedLines(g);
    var openCount = flagged.filter(function(l){ return lineStatus(l) === 'open'; }).length;
    var escCount = flagged.filter(function(l){ return lineStatus(l) === 'escalated'; }).length;

    var html = '';
    html += '<button class="backlink" data-back="1"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2 4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
      (readOnly ? 'Back to my deliveries' : 'Back to queue') + '</button>';

    html += '<div class="grn-card"><div class="grn-head"><div>' +
      '<h1 class="grn-title">' + g.id + ' · ' + g.supplier + '</h1>' +
      '<p class="page-sub">' + g.po + ' · ' + g.branch + '</p>' +
      '</div>' + chipHtml(st) + '</div>' +
      '<div class="meta-row">' +
        metaItem('Delivery date', g.date) +
        metaItem('Received by', g.receivedBy) +
        metaItem('Lines flagged', flagged.length + ' of ' + g.lines.length) +
      '</div></div>';

    if (readOnly) {
      if (st === 'open') html += banner('b-open', openCount + ' item' + (openCount>1?'s':'') + ' flagged for review', 'Procurement has been notified and will decide how to resolve this. You don’t need to do anything further.');
      else if (st === 'escalated') html += banner('b-escalated', 'Escalated for a second opinion', 'Procurement passed this to the ' + (flagged.find(function(l){return l.resolution && l.resolution.type==='escalate';}).resolution.to) + ' before deciding.');
      else if (st === 'resolved') html += banner('b-resolved', 'All flagged items resolved', 'You were notified when each one was decided — see below for what was resolved and why.');
    } else {
      if (st === 'open') html += banner('b-open', openCount + ' line' + (openCount>1?'s':'') + ' need' + (openCount>1?'':'s') + ' a decision', 'Review the comparison below and choose how each should be resolved.');
      else if (st === 'escalated') html += banner('b-escalated', 'Waiting on an escalation', escCount + ' line' + (escCount>1?'s':'') + ' passed to someone else. You can still resolve once you hear back.');
      else if (st === 'resolved') html += banner('b-resolved', 'Nothing left to review', 'Every flagged line on this GRN has a recorded resolution.');
    }

    html += '<div class="section-label">Line items</div>';
    g.lines.forEach(function(l){
      var lst = lineStatus(l);
      html += '<div class="linecard ' + (lst !== 'none' ? 'is-flagged' : '') + '">';
      html += '<div class="line-top"><div class="line-name">' + l.item + '</div><div style="display:flex; gap:10px; align-items:center;">' +
        (lst !== 'none' ? sevTag(lineSeverity(l)) : '') + chipHtml(lst) + '</div></div>';
      html += lineCompareBlock(l);
      if (l.opNote) html += '<div class="op-note"><span class="k">Operator note:</span> ' + escapeHtml(l.opNote) + '</div>';

      if (l.resolution) {
        html += '<div class="resolution-summary"><span class="rlabel">' + resolutionLabel(l.resolution.type) + (l.resolution.type==='escalate' ? ' to the ' + l.resolution.to : '') +
          (l.resolution.type === 'price_adjust' ? ' — ' + fmtMoney(l.confirmedPrice) + ' → ' + fmtMoney(l.resolution.newPrice) : '') +
          (l.resolution.type === 'credit_note' ? ' — ' + fmtMoney(l.resolution.amount) + (l.resolution.ref ? ' (' + l.resolution.ref + ')' : ' (reference pending)') : '') +
          ':</span><span class="rnote">' + escapeHtml(l.resolution.note) + ' — ' + l.resolution.actor + ', ' + l.resolution.ts + '</span></div>';
      } else if (lst === 'open' && !readOnly) {
        html += '<div class="line-actions"><button class="btn btn-primary btn-sm" data-resolve="' + g.id + '|' + l.id + '">Resolve this line</button></div>';
      } else if (lst === 'open' && readOnly) {
        html += '<div class="resolution-summary"><span class="rnote">Awaiting review from Procurement.</span></div>';
      }
      html += '</div>';
    });

    var log = buildActivityLog(g);
    if (log.length) {
      html += '<div class="section-label">Activity</div><div class="grn-card"><ul class="timeline">';
      log.forEach(function(entry){
        html += '<li><div class="tl-dot"></div><div class="tl-body">' +
          '<div class="tl-head">' + entry.head + '</div>' +
          '<div class="tl-meta">' + entry.actor + ' · ' + entry.ts + '</div>' +
          (entry.note ? '<div class="tl-note">' + escapeHtml(entry.note) + '</div>' : '') +
          '</div></li>';
      });
      html += '</ul></div>';
    }

    root.innerHTML = html;
  }

  function metaItem(k,v){ return '<div class="meta-item"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>'; }
  function banner(cls, strong, text){
    return '<div class="banner ' + cls + '"><div><strong>' + strong + '</strong><span class="btext">' + text + '</span></div></div>';
  }

  function buildActivityLog(g){
    var entries = [];
    g.lines.forEach(function(l){
      if (l.resolution) {
        var head = l.item + ' — ' + resolutionLabel(l.resolution.type);
        if (l.resolution.type === 'price_adjust') head += ' (' + fmtMoney(l.confirmedPrice) + ' → ' + fmtMoney(l.resolution.newPrice) + ')';
        if (l.resolution.type === 'credit_note') head += ' (' + fmtMoney(l.resolution.amount) + ')';
        if (l.resolution.type === 'escalate') head += ' → ' + l.resolution.to;
        entries.push({ head: head, actor: l.resolution.actor, ts: l.resolution.ts, note: l.resolution.note, sortTs: l.resolution.ts });
      }
    });
    entries.sort(function(a,b){ return new Date(b.sortTs) - new Date(a.sortTs); });
    return entries;
  }

  function renderOperatorList(){
    var mine = grns.filter(function(g){ return g.receivedBy === state.operatorUser; });
    mine.sort(function(a,b){ return new Date(b.date) - new Date(a.date); });

    var html = '<div class="page-head"><div><h1>My deliveries</h1><p class="page-sub">Deliveries you’ve received, and what happened to anything flagged as a mismatch.</p></div></div>';
    html += '<div class="tablewrap"><div class="scrollx"><table class="grid"><thead><tr><th>GRN</th><th>Supplier</th><th>Delivery date</th><th>Status</th></tr></thead><tbody>';
    mine.forEach(function(g){
      var st = grnStatus(g);
      html += '<tr class="rowlink" data-open-grn-ro="' + g.id + '">' +
        '<td class="cell-primary num">' + g.id + '</td>' +
        '<td>' + g.supplier + '</td>' +
        '<td class="num">' + g.date + '</td>' +
        '<td>' + chipHtml(st) + '</td>' +
        '</tr>';
    });
    html += '</tbody></table></div></div>';
    root.innerHTML = html;
  }

  function render(){
    renderNav();
    renderBell();
    if (state.role === 'operator') {
      if (state.screen.name === 'detail') renderDetail(state.screen.grnId, true);
      else renderOperatorList();
    } else {
      if (state.screen.name === 'detail') renderDetail(state.screen.grnId, false);
      else renderQueue();
    }
  }

  // ---------- Drawer / resolution flow ----------
  var drawer = document.getElementById('drawer');
  var overlay = document.getElementById('overlay');
  var drawerCtx = null;
  var drawerAction = 'accept';

  function openDrawer(grnId, lineId){
    var g = grns.find(function(x){ return x.id === grnId; });
    var l = g.lines.find(function(x){ return x.id === lineId; });
    drawerCtx = { grnId: grnId, lineId: lineId };
    drawerAction = 'accept';
    renderDrawer(g, l);
    drawer.classList.add('show');
    overlay.classList.add('show');
  }
  function closeDrawer(){
    drawer.classList.remove('show');
    overlay.classList.remove('show');
    drawerCtx = null;
  }

  function renderDrawer(g, l){
    var dv = dollarImpact(l);
    var html = '<div class="drawer-head"><h3>Resolve · ' + l.item + '</h3><p>' + g.id + ' — ' + g.supplier + '</p></div>';
    html += '<div class="drawer-body">';

    html += '<div class="field-recap">' +
      '<div class="row"><span class="k">Confirmed</span><span class="v">' + fmtQty(l.confirmedQty) + ' @ ' + fmtMoney(l.confirmedPrice) + '</span></div>' +
      '<div class="row"><span class="k">Received</span><span class="v">' + fmtQty(l.receivedQty) + ' @ ' + fmtMoney(l.receivedPrice) + '</span></div>' +
      '<div class="row"><span class="k">$ impact</span><span class="v">' + fmtMoney(dv) + '</span></div>' +
      '</div>';

    html += '<div class="action-tabs">' +
      tabBtn('accept', 'Accept as-is') + tabBtn('price_adjust', 'Adjust price') +
      tabBtn('credit_note', 'Credit note') + tabBtn('escalate', 'Escalate') +
      '</div>';

    html += '<div id="drawerFields"></div>';
    html += '</div><div class="drawer-foot"><button class="btn btn-ghost" data-cancel="1">Cancel</button><button class="btn btn-primary" id="submitResolution">Record resolution</button></div>';
    drawer.innerHTML = html;
    renderDrawerFields(l);
  }

  function tabBtn(type, label){
    return '<button class="action-tab ' + (drawerAction === type ? 'active' : '') + '" data-action="' + type + '">' + label + '</button>';
  }

  function renderDrawerFields(l){
    var el = document.getElementById('drawerFields');
    var dv = Math.abs(dollarImpact(l));
    var html = '';
    if (drawerAction === 'accept') {
      html += field('Note (required)', '<textarea id="fNote" placeholder="Why is this acceptable as received?"></textarea>');
    } else if (drawerAction === 'price_adjust') {
      html += field('Corrected unit price', '<input type="number" id="fPrice" step="0.01" value="' + l.receivedPrice.toFixed(2) + '">', 'Confirmed was ' + fmtMoney(l.confirmedPrice) + ', received was ' + fmtMoney(l.receivedPrice) + '.');
      html += field('Note (required)', '<textarea id="fNote" placeholder="What was agreed, and with whom?"></textarea>');
    } else if (drawerAction === 'credit_note') {
      html += field('Credit amount', '<input type="number" id="fAmount" step="0.01" value="' + dv.toFixed(2) + '">');
      html += field('Credit note reference (optional)', '<input type="text" id="fRef" placeholder="Add once received from supplier">');
      html += field('Note (required)', '<textarea id="fNote" placeholder="What\'s this credit for?"></textarea>');
    } else if (drawerAction === 'escalate') {
      var opts = reviewers.map(function(r){ return '<option value="' + r + '">' + r + '</option>'; }).join('');
      html += field('Escalate to', '<select id="fTo">' + opts + '</select>');
      html += field('Note (required)', '<textarea id="fNote" placeholder="Why does this need another opinion?"></textarea>');
    }
    el.innerHTML = html;
  }

  function field(label, inputHtml, hint){
    return '<div class="field"><label>' + label + '</label>' + inputHtml + (hint ? '<div class="hint">' + hint + '</div>' : '') + '</div>';
  }

  function submitResolution(){
    if (!drawerCtx) return;
    var g = grns.find(function(x){ return x.id === drawerCtx.grnId; });
    var l = g.lines.find(function(x){ return x.id === drawerCtx.lineId; });
    var note = (document.getElementById('fNote') || {}).value || '';
    if (!note.trim()) {
      var ta = document.getElementById('fNote');
      if (ta) { ta.style.borderColor = 'var(--critical)'; ta.focus(); }
      return;
    }
    var ts = '2026-07-13 ' + (9 + Math.floor(Math.random()*8)) + ':' + (Math.random()<0.5?'15':'40');
    var actor = 'Procurement Lead';

    if (drawerAction === 'accept') {
      l.resolution = { type: 'accept', actor: actor, ts: ts, note: note };
    } else if (drawerAction === 'price_adjust') {
      var newPrice = parseFloat(document.getElementById('fPrice').value) || l.receivedPrice;
      l.resolution = { type: 'price_adjust', actor: actor, ts: ts, note: note, newPrice: newPrice };
    } else if (drawerAction === 'credit_note') {
      var amount = parseFloat(document.getElementById('fAmount').value) || 0;
      var ref = document.getElementById('fRef').value || '';
      l.resolution = { type: 'credit_note', actor: actor, ts: ts, note: note, amount: amount, ref: ref };
    } else if (drawerAction === 'escalate') {
      var to = document.getElementById('fTo').value;
      l.resolution = { type: 'escalate', actor: actor, ts: ts, note: note, to: to };
    }

    closeDrawer();
    render();
    showToast('Resolution recorded on ' + l.item);
  }

  var toastTimer;
  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
  }

  // ---------- Tolerance popover ----------
  var tolPop = document.getElementById('tolPop');
  document.getElementById('settingsBtn').addEventListener('click', function(e){
    e.stopPropagation();
    notifPop.classList.remove('show');
    document.getElementById('tolQty').value = state.tolerance.qty;
    document.getElementById('tolPrice').value = state.tolerance.price;
    tolPop.classList.toggle('show');
  });

  // ---------- Notifications popover ----------
  var notifPop = document.getElementById('notifPop');
  document.getElementById('bellBtn').addEventListener('click', function(e){
    e.stopPropagation();
    tolPop.classList.remove('show');
    notifPop.classList.toggle('show');
  });
  notifPop.addEventListener('click', function(e){
    var item = e.target.closest('[data-notif-grn]');
    if (!item) return;
    state.screen = { name: 'detail', grnId: item.getAttribute('data-notif-grn') };
    notifPop.classList.remove('show');
    render();
  });

  document.addEventListener('click', function(e){
    if (!tolPop.contains(e.target) && e.target.id !== 'settingsBtn') tolPop.classList.remove('show');
    if (!notifPop.contains(e.target) && !e.target.closest('#bellBtn')) notifPop.classList.remove('show');
  });
  document.getElementById('tolApply').addEventListener('click', function(){
    var q = parseFloat(document.getElementById('tolQty').value);
    var p = parseFloat(document.getElementById('tolPrice').value);
    if (!isNaN(q)) state.tolerance.qty = q;
    if (!isNaN(p)) state.tolerance.price = p;
    tolPop.classList.remove('show');
    render();
    showToast('Tolerance updated — open items re-evaluated');
  });

  // ---------- Event delegation ----------
  document.getElementById('roleSwitch').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-role]');
    if (!btn) return;
    state.role = btn.getAttribute('data-role');
    document.querySelectorAll('.role-switch button').forEach(function(b){ b.classList.toggle('active', b === btn); });
    state.screen = { name: 'queue' };
    render();
  });

  root.addEventListener('click', function(e){
    var openGrn = e.target.closest('[data-open-grn]');
    var openGrnRo = e.target.closest('[data-open-grn-ro]');
    var back = e.target.closest('[data-back]');
    var filter = e.target.closest('[data-filter]');
    var resolveBtn = e.target.closest('[data-resolve]');

    if (openGrn) { state.screen = { name: 'detail', grnId: openGrn.getAttribute('data-open-grn') }; render(); }
    if (openGrnRo) { state.screen = { name: 'detail', grnId: openGrnRo.getAttribute('data-open-grn-ro') }; render(); }
    if (back) { state.screen = { name: 'queue' }; render(); }
    if (filter) { state.queueFilter = filter.getAttribute('data-filter'); render(); }
    if (resolveBtn) {
      var parts = resolveBtn.getAttribute('data-resolve').split('|');
      openDrawer(parts[0], parts[1]);
    }
  });

  root.addEventListener('input', function(e){
    if (e.target.id === 'queueSearchInput') {
      state.queueSearch = e.target.value;
      var pos = e.target.selectionStart;
      render();
      var again = document.getElementById('queueSearchInput');
      if (again) { again.focus(); again.setSelectionRange(pos, pos); }
    }
  });

  drawer.addEventListener('click', function(e){
    var tab = e.target.closest('[data-action]');
    var cancel = e.target.closest('[data-cancel]');
    var submit = e.target.id === 'submitResolution';
    if (tab) {
      drawerAction = tab.getAttribute('data-action');
      var g = grns.find(function(x){ return x.id === drawerCtx.grnId; });
      var l = g.lines.find(function(x){ return x.id === drawerCtx.lineId; });
      renderDrawer(g, l);
    }
    if (cancel) closeDrawer();
    if (submit) submitResolution();
  });
  overlay.addEventListener('click', closeDrawer);

  render();
})();
</script>
</body>
</html>
